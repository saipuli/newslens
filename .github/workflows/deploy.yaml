name: Build and Deploy Angular Native to GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: read    # Minimum layout access to read codebase
  pages: write       # Essential infrastructure access to modify GitHub Pages
  id-token: write    # OpenID Connect (OIDC) token capability for direct server deployment

concurrency:
  group: "pages"
  cancel-in-progress: true # Cancels old deployments if you push updates rapidly

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./your-sub-directory-name
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        # Replace 'your-repository-name' with your actual repository name
        run: npm run build --configuration=production

      - name: Upload Static Website Artifact (Latest v5)
        uses: actions/upload-pages-artifact@v5
        with:
          # Match your exact local Angular 17+ dist output folder path
          path: dist/rss-angular-viewer/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./your-sub-directory-name
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Direct to GitHub Pages Infrastructure (Latest v5)
        id: deployment
        uses: actions/deploy-pages@v5
